services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livepulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livepulse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-livepulse}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livepulse}"]
      interval: 3s
      timeout: 3s
      retries: 15

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-livepulse}:${POSTGRES_PASSWORD:-livepulse_secret}@db:5432/${POSTGRES_DB:-livepulse}
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-wtf-livepulse-jwt-secret-2024}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
